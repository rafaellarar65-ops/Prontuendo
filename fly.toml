app = 'app-cool-waterfall-752'
primary_region = 'gru'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = '30s'
  interval = '15s'
  method = 'GET'
  path = '/health'
  timeout = '5s'

[deploy]
  release_command = 'npx prisma migrate deploy'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
