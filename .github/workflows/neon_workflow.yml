name: Neon Database Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply Prisma schema to Neon
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: |
          if [ -d prisma/migrations ] && [ "$(find prisma/migrations -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
            echo "Migrations found. Running prisma migrate deploy..."
            npx prisma migrate deploy
          else
            echo "No migrations found. Running prisma db push to create tables from schema..."
            npx prisma db push --accept-data-loss
          fi

      - name: Seed database (optional)
        if: ${{ secrets.RUN_DB_SEED == 'true' }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: npx prisma db seed
